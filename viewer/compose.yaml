services:
  web:
    build:
      context: ..
      dockerfile: viewer/Dockerfile
      target: production
    ports:
      - "127.0.0.1:4173:8080"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=101,gid=101,mode=0700
    stop_grace_period: 5s
