# default params in data_module/default.yaml
data_module:
  num_workers: 3
  num_workers_val: 1
  pin_memory: true
  images_per_gpu: 16
  aspect_ratio_range: [1.0, 1.0]
  train_datasets:
    - class: ue
      size: 10800
      args: ${datasets.ue}
    - class: dynamic_replica
      size: 1080
      args: ${datasets.dynamic_replica}
    - class: waymo
      size: 6480
      args: ${datasets.waymo}
    - class: point_odyssey
      size: 10240
      args: ${datasets.point_odyssey}
    - class: dl3dv
      size: 1080
      args: ${datasets.dl3dv}
    - class: omnigame
      size: 5400
      args: ${datasets.omnigame}
    - class: stereo4d
      size: 1080
      args: ${datasets.stereo4d}
    - class: spring
      size: 1080
      args: ${datasets.spring}
    - class: hoi4d
      size: 1080
      args: ${datasets.hoi4d}
  validation_datasets:
    - class: ue_test
      args: ${datasets.ue_test}
  
# default params in trainer/default.yaml
trainer:
  log_every_n_steps: 50
  max_epochs: 320
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 0
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"

visualizer:
  save_nums: 0

# saving cfg:
save_every_n_epochs: 2

